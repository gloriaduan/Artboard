                - paragraph [ref=e397]: Edward Hopper (American, 1882–1967)
                - paragraph [ref=e398]: "1942"
              - generic [ref=e399]:
                - paragraph [ref=e401]:
                  - text: About
                  - emphasis [ref=e402]: Nighthawks
                  - text: "Edward Hopper recollected, “unconsciously, probably, I was painting the loneliness of a large city.” In an all-night diner, three customers sit at the counter opposite a server, each appear to be lost in thought and disengaged from one another. The composition is tightly organized and spare in details: there is no entrance to the establishment, no debris on the streets. Through harmonious geometric forms and the glow of the diner’s electric lighting, Hopper created a serene, beautiful, yet enigmatic scene. Although inspired by a restaurant Hopper had seen on Greenwich Avenue in New York, the painting is not a realistic transcription of an actual place. As viewers, we are left to wonder about the figures, their relationships, and this imagined world."
